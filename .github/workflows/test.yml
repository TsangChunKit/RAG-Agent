name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run unit tests
      env:
        # Mock API keys（避免真实调用）
        GEMINI_API_KEY: fake-test-key-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
        OPENAI_API_KEY: sk-fake-test-key-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      run: |
        pytest tests/unit/ -v --cov=scripts --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  integration-test:
    runs-on: ubuntu-latest
    # 集成测试只在 main 分支运行（节省 CI 时间）
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run integration tests
      env:
        GEMINI_API_KEY: fake-test-key-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
        OPENAI_API_KEY: sk-fake-test-key-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      run: |
        pytest tests/integration/ -v --integration
