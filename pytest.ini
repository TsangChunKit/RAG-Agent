[pytest]
# pytest 配置文件

# 测试发现
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试路径
testpaths = tests

# Python path（添加项目根目录）
pythonpath = .

# 输出选项
addopts =
    # 详细输出
    -v
    # 显示本地变量（调试用）
    --tb=short
    # 显示测试覆盖率（需要 pytest-cov）
    --cov=scripts
    --cov-report=term-missing
    --cov-report=html
    # 警告设置
    -W ignore::DeprecationWarning
    -W ignore::PendingDeprecationWarning
    # 并行执行（需要 pytest-xdist）
    -n auto

# Markers
markers =
    integration: 集成测试（需要 --integration flag）
    slow: 慢速测试（可用 -m "not slow" 跳过）
    unit: 单元测试
    llm: 需要 LLM 调用的测试（应该 mock）

# 覆盖率配置
[coverage:run]
source = scripts
omit =
    */tests/*
    */__pycache__/*
    */.venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
