# 评估集：用于判断检索准不准、是否需要在 v1.5 加 reranker。
# 每条问题的 expect_* 均已用 grep 核对过真实语料（data/raw/*.txt），不是假设。
# 注意：显卡/电脑购买纠结是 Andy 反复咨询的主题（至少 8 次咨询提到过，
# 2025-05-10/05-13/05-27、2026-03-29/05-16/06-05/06-13/06-21/06-27），
# 所以不强求命中某一个"标准答案"日期，只要求命中提到该主题的任一场次即可。
- q: "我哪一次谈到了买游戏电脑/显卡的纠结？"
  expect_contains: ["显卡"]
  expect_date_in:
    ["2025-05-10", "2025-05-13", "2025-05-27", "2026-03-29",
     "2026-05-16", "2026-06-05", "2026-06-13", "2026-06-21", "2026-06-27"]
- q: "我对换工作的恐惧具体是什么？"
  expect_contains: ["恐惧", "面试"]
  expect_date: "2026-06-27"
- q: "咨询师建议我用第三者视角看自己吗？"
  expect_contains: ["第三者"]
  expect_date_in: ["2026-06-27", "2026-06-13"]
- q: "亲密关系里我和女朋友有什么摩擦？"
  expect_contains: ["关系"]
- q: "我对存钱和花钱的态度是怎样的？"
  expect_contains: ["存钱", "花钱"]
